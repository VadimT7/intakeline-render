name: render-audit-video

on:
  workflow_dispatch:
    inputs:
      slug: { description: compact slug, required: true }
      agency: { description: agency name (Drive filename), required: true }
      client_firm: { description: client law firm being audited, required: true }
      first_name: { description: contact first name, required: false }
      site_url: { description: client firm website to scroll, required: false }
      agency_url: { description: agency website (scene 1), required: false }
      leak_note: { description: what the after-hours call exposed, required: false }
      page_url: { description: audit page url, required: false }
      skip_callback: { description: "1 = don't notify n8n (for testing)", required: false, default: "0" }
      narrate_only: { description: "1 = mint voice-4 audio + timings only, skip slideshow", required: false, default: "0" }
      broll_only: { description: "1 = capture landscape site b-roll only", required: false, default: "0" }
      tts_model: { description: "ElevenLabs model_id override (e.g. eleven_turbo_v2_5)", required: false, default: "" }
      no_vs: { description: "1 = omit voice_settings, use the voice's saved defaults", required: false, default: "0" }
      voice_id: { description: "ElevenLabs voice_id override (premade/natural voice)", required: false, default: "" }
      speed: { description: "ElevenLabs speed override e.g. 1.15 (natural voices pace slow)", required: false, default: "" }
  repository_dispatch:
    types: [render-audit-video]

concurrency:
  group: render-${{ github.event.client_payload.slug || github.event.inputs.slug }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg (with libass)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core
          ffmpeg -filters 2>/dev/null | grep -q ' ass ' && echo "libass OK" || (echo "libass MISSING" && exit 1)

      - name: Install deps + Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Render
        env:
          SLUG: ${{ github.event.client_payload.slug || github.event.inputs.slug }}
          AGENCY: ${{ github.event.client_payload.agency || github.event.inputs.agency }}
          CLIENT_FIRM: ${{ github.event.client_payload.client_firm || github.event.inputs.client_firm }}
          FIRST_NAME: ${{ github.event.client_payload.first_name || github.event.inputs.first_name }}
          SITE_URL: ${{ github.event.client_payload.site_url || github.event.inputs.site_url }}
          AGENCY_URL: ${{ github.event.client_payload.agency_url || github.event.inputs.agency_url }}
          LEAK_NOTE: ${{ github.event.client_payload.leak_note || github.event.inputs.leak_note }}
          PAGE_URL: ${{ github.event.client_payload.page_url || github.event.inputs.page_url }}
          SKIP_CALLBACK: ${{ github.event.client_payload.skip_callback || github.event.inputs.skip_callback }}
          NARRATE_ONLY: ${{ github.event.client_payload.narrate_only || github.event.inputs.narrate_only }}
          BROLL_ONLY: ${{ github.event.client_payload.broll_only || github.event.inputs.broll_only }}
          TTS_MODEL: ${{ github.event.client_payload.tts_model || github.event.inputs.tts_model }}
          NO_VS: ${{ github.event.client_payload.no_vs || github.event.inputs.no_vs }}
          VOICE_ID: ${{ github.event.client_payload.voice_id || github.event.inputs.voice_id }}
          SPEED: ${{ github.event.client_payload.speed || github.event.inputs.speed }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: intakeline-media
          N8N_INGEST_URL: ${{ vars.N8N_INGEST_URL }}
          ELEVEN_API_KEY: ${{ secrets.ELEVEN_API_KEY }}
          ELEVEN_VOICE_ID: ${{ secrets.ELEVEN_VOICE_ID }}
        run: node render.mjs

      - name: Upload artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-video-${{ github.event.client_payload.slug || github.event.inputs.slug }}
          path: |
            out.mp4
            narration.mp3
            narr_meta.json
            broll_agency.mp4
            broll_client.mp4
          if-no-files-found: ignore
          retention-days: 7
